# ── CloneGuard GitHub Actions Workflow ───────────────────────────────────────
# Triggers on every PR open or update.
# Scans changed Java files for clones, posts a review comment, and (new)
# suggests an Extract Method refactor as a clickable "Commit suggestion"
# wherever the duplicate method's lines are actually part of the PR's diff.

name: CloneGuard — Clone Detection

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.java'

jobs:
  clone-detection:
    name: Scan for Code Clones
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # Step 1: Checkout the PR code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Get list of changed Java files
      - name: Get changed Java files
        id: changed_files
        run: |
          echo "Getting changed Java files..."
          git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.java' > changed_files.txt
          echo "Changed Java files:"
          cat changed_files.txt
          echo "count=$(wc -l < changed_files.txt)" >> $GITHUB_OUTPUT

      # Step 3: Extract functions (with line ranges) from changed files, send to CloneGuard
      - name: Run CloneGuard scan
        id: scan
        env:
          CLONEGUARD_URL: ${{ secrets.CLONEGUARD_SERVER_URL }}
        run: |
          python3 << 'PYTHON'
          import os, re, json, urllib.request

          CLONEGUARD_URL = os.environ.get("CLONEGUARD_URL", "http://localhost:8765")

          with open("changed_files.txt") as f:
              changed_files = [line.strip() for line in f if line.strip().endswith(".java")]

          if not changed_files:
              print("No Java files changed. Skipping scan.")
              with open("scan_result.json", "w") as f:
                  json.dump({"cloneGroups": [], "totalClones": 0, "skipped": True}, f)
              with open("function_locations.json", "w") as f:
                  json.dump({}, f)
              exit(0)

          print(f"Scanning {len(changed_files)} Java file(s)...")

          def extract_functions_from_file(filepath):
              """Extract Java methods + their line ranges from a file using regex."""
              functions = []
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
              except Exception:
                  return functions, ""

              pattern = re.compile(
                  r'(?:(?:public|private|protected|static|final|synchronized)\s+)+'
                  r'(?:void|int|long|double|float|boolean|char|byte|short|String|[\w<>\[\]]+)\s+'
                  r'(\w+)\s*\([^)]*\)\s*(?:throws\s+[\w,\s]+)?\s*\{',
                  re.MULTILINE
              )

              for match in pattern.finditer(content):
                  name = match.group(1)
                  if name in ('if', 'for', 'while', 'switch', 'try', 'catch'):
                      continue

                  start = match.start()
                  brace_start = content.find('{', match.end() - 1)
                  if brace_start == -1:
                      continue

                  depth, end = 0, brace_start
                  for i in range(brace_start, len(content)):
                      if content[i] == '{':
                          depth += 1
                      elif content[i] == '}':
                          depth -= 1
                          if depth == 0:
                              end = i + 1
                              break

                  method_code = content[start:end].strip()
                  if len(method_code) > 20:
                      start_line = content[:start].count('\n') + 1
                      end_line = content[:end - 1].count('\n') + 1
                      functions.append({
                          "name": name, "code": method_code,
                          "start_line": start_line, "end_line": end_line
                      })

              return functions, content

          all_results = []
          function_locations = {}   # filepath -> {funcname: [start_line, end_line]}

          for filepath in changed_files:
              if not os.path.exists(filepath):
                  print(f"File not found: {filepath}")
                  continue

              functions, _ = extract_functions_from_file(filepath)
              print(f"{filepath}: found {len(functions)} function(s)")
              function_locations[filepath] = {
                  fn["name"]: [fn["start_line"], fn["end_line"]] for fn in functions
              }

              if len(functions) < 2:
                  print(f"Skipping {filepath} — need at least 2 functions")
                  continue

              payload = json.dumps({
                  "functions": [{"name": fn["name"], "code": fn["code"]} for fn in functions],
                  "filename": os.path.basename(filepath)
              }).encode('utf-8')

              try:
                  req = urllib.request.Request(
                      f"{CLONEGUARD_URL}/scan", data=payload,
                      headers={"Content-Type": "application/json"}, method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read().decode())
                      result["filepath"] = filepath
                      all_results.append(result)
                      print(f"{filepath}: {result['totalClones']} clone group(s) found")
              except Exception as e:
                  print(f"Error scanning {filepath}: {e}")

          total_clones = sum(r.get("totalClones", 0) for r in all_results)
          all_groups = []
          for r in all_results:
              for g in r.get("cloneGroups", []):
                  g["filepath"] = r.get("filepath", "")
                  all_groups.append(g)

          with open("scan_result.json", "w") as f:
              json.dump({
                  "cloneGroups": all_groups,
                  "totalClones": total_clones,
                  "filesScanned": len(changed_files)
              }, f, indent=2)

          with open("function_locations.json", "w") as f:
              json.dump(function_locations, f, indent=2)

          print(f"\nTotal clones found: {total_clones}")
          PYTHON


      # Step 4: Post a summary comment with a checklist of every clone
      # group that has an available refactor. No inline suggestion
      # comments here anymore -- checking a box and commenting /refactor
      # triggers a SEPARATE workflow (apply-refactors.yml) that re-verifies
      # everything against the live file right before committing, which is
      # what actually lets it safely handle multiple, possibly-conflicting
      # clone groups in one PR (a plain function can appear in more than
      # one detected pair -- e.g. multiplyAll() matching BOTH
      # multiplyAllExact() by structure AND factorialIterative() by
      # semantics -- found directly while testing all four clone types in
      # one file together). Posting independent suggestion comments per
      # group couldn't detect that kind of overlap; re-checking live state
      # at apply-time can.
      - name: Post clone report as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request

          GH_TOKEN = os.environ["GH_TOKEN"]
          PR_NUMBER = os.environ["PR_NUMBER"]
          REPO = os.environ["REPO"]
          THRESHOLD = 3  # Block merge if more than this many clones found

          with open("scan_result.json") as f:
              result = json.load(f)

          total = result.get("totalClones", 0)
          groups = result.get("cloneGroups", [])
          files_scanned = result.get("filesScanned", 0)

          if total == 0:
              body = "## ✅ CloneGuard — No Clones Detected\n\n"
              body += f"Scanned {files_scanned} Java file(s). Your code is clean!\n"
          else:
              severity_icon = "🔴" if total > THRESHOLD else "🟡"
              body = f"## {severity_icon} CloneGuard — {total} Clone Group(s) Detected\n\n"
              body += (
                  "> ℹ️ **PR Review Mode** — this is a team-level gate that runs on every "
                  "PR. For real-time feedback while coding, use the CloneGuard IntelliJ plugin.\n\n"
              )
              body += f"Scanned {files_scanned} Java file(s) changed in this PR.\n\n"
              body += "| # | Clone Type | Function A | Function B | Similarity | Layer | Severity |\n"
              body += "|---|-----------|-----------|-----------|------------|-------|----------|\n"
              for i, g in enumerate(groups, 1):
                  body += f"| {i} | {g['cloneType']} | `{g['functionA']}()` | `{g['functionB']}()` | {g['similarity']} | {g['detectionLayer']} | {g['severity']} |\n"

              body += "\n### Recommendations\n"
              for i, g in enumerate(groups, 1):
                  body += f"**{i}. {g['functionA']}() ↔ {g['functionB']}():** {g['recommendation']}\n\n"

              body += "\n### Detection Method\n"
              body += (
                  "**Layer 1** (Types 1–2): exact and normalized Karp-Rabin hashing over "
                  "whitespace/identifier-normalized code. **Layer 2** (Types 3–4): CodeBERT "
                  "neural embeddings compared via FAISS cosine similarity.\n"
              )

              suggestable = [g for g in groups if g.get("suggestion", {}).get("available")]
              if suggestable:
                  body += "\n### Select clones to refactor\n"
                  body += (
                      "Check the box(es) for the clone(s) you'd like refactored, then comment "
                      "`/refactor` (as its own comment) to apply your selections together. Each "
                      "checked item is re-verified against the current code right before "
                      "anything is applied -- if two selected items turn out to touch the same "
                      "function, only the first is applied and the rest are skipped with a note, "
                      "rather than risking a broken file.\n\n"
                  )
                  for i, g in enumerate(groups, 1):
                      s = g["suggestion"]
                      technique_label = "Method Delegation" if s.get("technique") == "delegation" else "Extract Method"
                      body += (
                          f"- [ ] **{i}.** `{g.get('filepath', g.get('filename', ''))}`: "
                          f"`{g['functionA']}()` ↔ `{g['functionB']}()` — {g['cloneType']}, {technique_label}\n"
                      )
                  body += "\n"

              not_extractable = [g for g in groups if g.get("suggestion") and not g["suggestion"].get("available")]
              if not_extractable:
                  body += "\n<details><summary>Why some clones have no refactor suggestion</summary>\n\n"
                  for g in not_extractable:
                      body += f"- **{g['functionA']}() ↔ {g['functionB']}()**: {g['suggestion'].get('reason', 'n/a')}\n"
                  body += "\n</details>\n"

              if total > THRESHOLD:
                  body += f"\n---\n⛔ **Merge blocked** — {total} clones exceed the threshold of {THRESHOLD}. Please refactor before merging.\n"
              else:
                  body += f"\n---\n⚠️ Clones detected but below threshold ({total}/{THRESHOLD}). Consider refactoring.\n"

          body += "\n*Powered by CloneGuard — AI-Assisted Code Clone Detection*"

          comment_url = f"https://api.github.com/repos/{REPO}/issues/{PR_NUMBER}/comments"
          payload = json.dumps({"body": body}).encode('utf-8')
          req = urllib.request.Request(
              comment_url, data=payload,
              headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              }, method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              print(f"Comment posted: {resp.status}")

          if total > THRESHOLD:
              print(f"FAILING: {total} clones exceed threshold of {THRESHOLD}")
              exit(1)
          else:
              print(f"PASSING: {total} clones within threshold of {THRESHOLD}")
          PYTHON