name: CloneGuard — PR Clone Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  clone-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Get changed Java files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.java$' > changed_files.txt || true
          echo "Changed Java files:"
          cat changed_files.txt || echo "(none)"

      - name: Run CloneGuard scan
        env:
          CLONEGUARD_SERVER_URL: ${{ secrets.CLONEGUARD_SERVER_URL }}
        run: |
          python3 << 'PYTHON'
          import json, os, urllib.request

          server_url = os.environ.get("CLONEGUARD_SERVER_URL", "").rstrip("/")

          changed_files = []
          try:
              with open("changed_files.txt") as f:
                  changed_files = [l.strip() for l in f if l.strip()]
          except FileNotFoundError:
              pass

          if not changed_files:
              result = {"cloneGroups": [], "totalClones": 0, "filesScanned": 0}
              with open("scan_result.json", "w") as f:
                  json.dump(result, f, indent=2)
              print("No Java files changed.")
              exit(0)

          all_results = []

          for filepath in changed_files:
              if not os.path.exists(filepath):
                  print(f"Skipping {filepath} — file not found")
                  continue
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      code = f.read()

                  # Extract functions from file to match /scan endpoint format
                  import re
                  pattern = re.compile(
                      r'(?:public|private|protected|static|final|\s)+'
                      r'(?:void|int|long|double|float|boolean|String|\w+)\s+'
                      r'(\w+)\s*\([^)]*\)\s*\{',
                      re.MULTILINE
                  )
                  functions = []
                  for m in pattern.finditer(code):
                      name = m.group(1)
                      start = m.start()
                      # Extract full method body by counting braces
                      depth = 0
                      end = start
                      for k, ch in enumerate(code[start:], start):
                          if ch == '{':
                              depth += 1
                          elif ch == '}':
                              depth -= 1
                              if depth == 0:
                                  end = k + 1
                                  break
                      functions.append({"name": name, "code": code[start:end]})

                  if len(functions) < 2:
                      print(f"{filepath}: fewer than 2 functions — skipping")
                      continue

                  payload = json.dumps({
                      "functions": functions,
                      "filename": filepath
                  }).encode("utf-8")

                  req = urllib.request.Request(
                      f"{server_url}/scan",
                      data=payload,
                      headers={"Content-Type": "application/json"},
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read().decode())
                      result["filepath"] = filepath
                      all_results.append(result)
                      print(f"{filepath}: {result.get('totalClones', 0)} clone group(s) found")
              except Exception as e:
                  print(f"Error scanning {filepath}: {e}")

          # ── BUG 1 FIX: build list first, count after ──────────────────────
          all_groups = []
          for r in all_results:
              for g in r.get("cloneGroups", []):
                  g["filepath"] = r.get("filepath", "")
                  all_groups.append(g)

          total_clones = len(all_groups)  # count from the list, never trust the field
          # ─────────────────────────────────────────────────────────────────────

          final_result = {
              "cloneGroups": all_groups,
              "totalClones": total_clones,
              "filesScanned": len(changed_files)
          }

          with open("scan_result.json", "w") as f:
              json.dump(final_result, f, indent=2)

          print(f"\nTotal clone groups found: {total_clones}")
          PYTHON

      - name: Post clone report as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request

          GH_TOKEN  = os.environ["GH_TOKEN"]
          PR_NUMBER = os.environ["PR_NUMBER"]
          REPO      = os.environ["REPO"]
          THRESHOLD = 3

          with open("scan_result.json") as f:
              result = json.load(f)

          groups       = result.get("cloneGroups", [])
          files_scanned = result.get("filesScanned", 0)

          # ── BUG 1 FIX: always recount from the list ───────────────────────
          total = len(groups)
          # ─────────────────────────────────────────────────────────────────────

          if total == 0:
              body  = "## ✅ CloneGuard — No Clones Detected\n\n"
              # ── BUG 3 FIX: mode label ─────────────────────────────────────
              body += "> ℹ️ **PR Review Mode** — CloneGuard runs here as a team-level "
              body += "gate before merge. For real-time in-editor feedback, use the "
              body += "CloneGuard IntelliJ plugin (Scenarios 1 & 2).\n\n"
              # ──────────────────────────────────────────────────────────────
              body += f"Scanned {files_scanned} Java file(s). Your code is clean!\n"
          else:
              severity_icon = "🔴" if total > THRESHOLD else "🟡"
              body  = f"## {severity_icon} CloneGuard — {total} Clone Group(s) Detected\n\n"

              # ── BUG 3 FIX: mode label ─────────────────────────────────────
              body += "> ℹ️ **PR Review Mode** — CloneGuard runs here as a team-level "
              body += "gate before merge. For real-time in-editor feedback, use the "
              body += "CloneGuard IntelliJ plugin (Scenarios 1 & 2).\n\n"
              # ──────────────────────────────────────────────────────────────

              body += f"Scanned **{files_scanned}** Java file(s) changed in this PR.\n\n"

              # ── BUG 4 FIX: split detection explanation into its own block ──
              body += "**Detection method:** Type 1 & 2 clones are caught by Layer 1 "
              body += "(exact and normalized identifier hashing — no server needed). "
              body += "Type 3 & 4 clones are caught by Layer 2 using CodeBERT neural "
              body += "embeddings compared via cosine similarity through a FAISS vector "
              body += "index — not keyword matching or heuristics.\n\n"
              # ──────────────────────────────────────────────────────────────

              # ── BUG 1 FIX: table row count = len(groups), always ──────────
              body += "| # | Clone Type | Function A | Function B | Similarity | Layer | Severity |\n"
              body += "|---|-----------|-----------|-----------|------------|-------|----------|\n"
              for i, g in enumerate(groups, 1):
                  body += (f"| {i} | {g['cloneType']} "
                           f"| `{g['functionA']}()` "
                           f"| `{g['functionB']}()` "
                           f"| {g['similarity']} "
                           f"| {g['detectionLayer']} "
                           f"| {g['severity']} |\n")
              # ──────────────────────────────────────────────────────────────

              body += "\n### 💡 Refactoring Suggestions\n\n"
              for i, g in enumerate(groups, 1):
                  body += f"**{i}. `{g['functionA']}()` ↔ `{g['functionB']}()`**\n"
                  body += f"{g['recommendation']}\n\n"

              # ── BUG 2 FIX: show developer action steps per group ──────────
              body += "<details>\n<summary>How to refactor these in your IDE</summary>\n\n"
              body += "1. Open the file in IntelliJ IDEA with the CloneGuard plugin installed.\n"
              body += "2. Run **Tools → CloneGuard → Scan Current File** (or `Ctrl+Shift+G`).\n"
              body += "3. The clone groups above will appear in the CloneGuard panel.\n"
              body += "4. Click **Refactor →** next to each group — the plugin will confirm\n"
              body += "   and then replace the duplicate method body with a delegation call\n"
              body += "   to the canonical function.\n"
              body += "5. Re-run the scan to confirm zero clones before pushing.\n\n"
              body += "</details>\n\n"
              # ──────────────────────────────────────────────────────────────

              if total > THRESHOLD:
                  body += f"\n---\n⛔ **Merge blocked** — {total} clone group(s) exceed "
                  body += f"the threshold of {THRESHOLD}. Please refactor before merging.\n"
              else:
                  body += f"\n---\n⚠️ Clone count ({total}/{THRESHOLD}) is below the merge "
                  body += "threshold. Refactoring is strongly recommended.\n"

          body += "\n*Powered by [CloneGuard](https://github.com/SE4AIResearch/clone-propagation) — AI-Assisted Code Clone Detection*"

          comment_url = f"https://api.github.com/repos/{REPO}/issues/{PR_NUMBER}/comments"
          payload = json.dumps({"body": body}).encode("utf-8")
          req = urllib.request.Request(
              comment_url,
              data=payload,
              headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              print(f"Comment posted: {resp.status}")

          if total > THRESHOLD:
              print(f"FAILING: {total} clones exceed threshold of {THRESHOLD}")
              exit(1)
          else:
              print(f"PASSING: {total} clones within threshold of {THRESHOLD}")
          PYTHON