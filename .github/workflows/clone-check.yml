name: CloneGuard — Clone Detection

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.java'

jobs:
  clone-detection:
    name: Scan for Code Clones
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Java files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.java' > changed_files.txt
          echo "Changed Java files:"
          cat changed_files.txt

      - name: Run CloneGuard scan
        env:
          CLONEGUARD_URL: ${{ secrets.CLONEGUARD_SERVER_URL }}
        run: |
          python3 << 'PYTHON'
          import os, re, json, urllib.request

          CLONEGUARD_URL = os.environ.get("CLONEGUARD_URL", "http://localhost:8765")

          with open("changed_files.txt") as f:
              changed_files = [l.strip() for l in f if l.strip().endswith(".java")]

          if not changed_files:
              print("No Java files changed.")
              with open("scan_result.json", "w") as f:
                  json.dump({"cloneGroups": [], "totalClones": 0, "filesScanned": 0}, f)
              exit(0)

          def extract_functions(filepath):
              functions = []
              try:
                  with open(filepath, 'r') as f:
                      content = f.read()
              except:
                  return functions

              pattern = re.compile(
                  r'(?:(?:public|private|protected|static|final|synchronized)\s+)+'
                  r'(?:void|int|long|double|float|boolean|char|byte|short|String|[\w<>\[\]]+)\s+'
                  r'(\w+)\s*\([^)]*\)\s*(?:throws\s+[\w,\s]+)?\s*\{',
                  re.MULTILINE
              )

              for match in pattern.finditer(content):
                  name = match.group(1)
                  if name in ('if','for','while','switch','try','catch','class'):
                      continue
                  start = match.start()
                  brace_start = content.find('{', match.end() - 1)
                  if brace_start == -1:
                      continue
                  depth = 0
                  end = brace_start
                  for i in range(brace_start, len(content)):
                      if content[i] == '{': depth += 1
                      elif content[i] == '}':
                          depth -= 1
                          if depth == 0:
                              end = i + 1
                              break
                  method_code = content[start:end].strip()
                  if len(method_code) > 20:
                      functions.append({"name": name, "code": method_code})
              return functions

          all_results = []

          for filepath in changed_files:
              if not os.path.exists(filepath):
                  continue

              # Scan the ENTIRE file — all functions including existing ones
              # This detects clones between new and existing functions in same file
              functions = extract_functions(filepath)
              print(f"{filepath}: found {len(functions)} function(s): {[f['name'] for f in functions]}")

              if len(functions) < 2:
                  print(f"Skipping — need at least 2 functions")
                  continue

              payload = json.dumps({
                  "functions": functions,
                  "filename": os.path.basename(filepath)
              }).encode('utf-8')

              try:
                  req = urllib.request.Request(
                      f"{CLONEGUARD_URL}/scan",
                      data=payload,
                      headers={"Content-Type": "application/json"},
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read().decode())
                      result["filepath"] = filepath
                      all_results.append(result)
                      print(f"{filepath}: {result['totalClones']} clone group(s) found")
              except Exception as e:
                  print(f"Error: {e}")

          total = sum(r.get("totalClones", 0) for r in all_results)
          groups = []
          for r in all_results:
              for g in r.get("cloneGroups", []):
                  g["filepath"] = r.get("filepath", "")
                  groups.append(g)

          with open("scan_result.json", "w") as f:
              json.dump({"cloneGroups": groups, "totalClones": total, "filesScanned": len(changed_files)}, f, indent=2)

          print(f"Total clones: {total}")
          PYTHON

      - name: Post clone report as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.request

          GH_TOKEN = os.environ["GH_TOKEN"]
          PR_NUMBER = os.environ["PR_NUMBER"]
          REPO = os.environ["REPO"]
          THRESHOLD = 3

          with open("scan_result.json") as f:
              result = json.load(f)

          total = result.get("totalClones", 0)
          groups = result.get("cloneGroups", [])
          files_scanned = result.get("filesScanned", 0)

          if total == 0:
              body = "## ✅ CloneGuard — No Clones Detected\n\n"
              body += f"Scanned {files_scanned} Java file(s). Your code is clean!\n"
          else:
              icon = "🔴" if total > THRESHOLD else "🟡"
              body = f"## {icon} CloneGuard — {total} Clone Group(s) Detected\n\n"
              body += f"Scanned {files_scanned} Java file(s) changed in this PR.\n\n"
              body += "| # | Clone Type | Function A | Function B | Similarity | Layer | Severity |\n"
              body += "|---|-----------|-----------|-----------|------------|-------|----------|\n"
              for i, g in enumerate(groups, 1):
                  body += f"| {i} | {g['cloneType']} | `{g['functionA']}()` | `{g['functionB']}()` | {g['similarity']} | {g['detectionLayer']} | {g['severity']} |\n"
              body += "\n### Recommendations\n"
              for i, g in enumerate(groups, 1):
                  body += f"**{i}. {g['functionA']}() ↔ {g['functionB']}():** {g['recommendation']}\n\n"
              if total > THRESHOLD:
                  body += f"\n---\n⛔ **Merge blocked** — {total} clones exceed threshold of {THRESHOLD}.\n"
              else:
                  body += f"\n---\n⚠️ Clones detected but below threshold ({total}/{THRESHOLD}). Consider refactoring.\n"

          body += "\n*Powered by CloneGuard — AI-Assisted Code Clone Detection*"

          payload = json.dumps({"body": body}).encode('utf-8')
          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/issues/{PR_NUMBER}/comments",
              data=payload,
              headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              print(f"Comment posted: {resp.status}")

          if total > THRESHOLD:
              exit(1)
          PYTHON
